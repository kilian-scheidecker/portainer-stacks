services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - 8191:8191
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - procurement

  jackett:
    image: linuxserver/jackett:v0.24.512
    container_name: jackett
    restart: unless-stopped
    ports:
      - 9117:9117
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/CET
    volumes:
      - jackett_config:/config
      - /etc/timezone:/etc/timezone:ro
    networks:
      - procurement
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9117"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s

  qbittorrent:
    image: linuxserver/qbittorrent:v5.1.4
    container_name: qbittorrent
    restart: unless-stopped
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/CET
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent_config:/config
      - $DOWNLOADS_DIR:/downloads
      - /etc/timezone:/etc/timezone:ro
    networks:
      - procurement
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s

  radarr:
    image: linuxserver/radarr:v6.0.4
    container_name: radarr
    ports:
      - 7878:7878
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/CET
    volumes:
      - radarr_config:/config
      - $MEDIA_PATH/movies:/movies
      - $DOWNLOADS_DIR:/downloads
      - /etc/timezone:/etc/timezone:ro
    networks:
      - procurement
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    

  sonarr:
    image: linuxserver/sonarr:v4.0.17
    container_name: sonarr
    ports:
      - 8989:8989
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/CET
    volumes:
      - sonarr_config:/config
      - $MEDIA_PATH/series:/tv
      - $DOWNLOADS_DIR:/downloads
      - /etc/timezone:/etc/timezone:ro
    networks:
      - procurement
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  procurement:
    external: true

volumes:
  jackett_config:
  qbittorrent_config:
  radarr_config:
  sonarr_config:

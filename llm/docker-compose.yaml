services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-cpp
    restart: unless-stopped
    volumes:
      - /opt/llm/models:/models:ro
    networks:
      - hephaistos
    command: >
      -m /models/Qwen3.5-4B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8000
      --threads 9
      --ctx-size 2048
      --n-gpu-layers 0
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      llama:
        condition: service_healthy
    ports:
      - "8001:8080"
    environment:
      # Point Open WebUI at llama.cpp's OpenAI-compatible API
      - OPENAI_API_BASE_URL=http://llama:8000/v1
      # llama.cpp doesn't require a real key; Open WebUI expects one to be set
      - OPENAI_API_KEY=local
      # Optional: makes first-run easier (admin user created on first visit)
      # - WEBUI_AUTH=true
      # Authentik settings
      - OAUTH_CLIENT_ID=$OAUTH_CLIENT_ID
      - OAUTH_CLIENT_SECRET=$OAUTH_CLIENT_SECRET
      - OAUTH_PROVIDER_NAME=authentik
      - OPENID_PROVIDER_URL=$OPENID_PROVIDER_URL
      - OPENID_REDIRECT_URI=$OPENID_REDIRECT_URI
      - WEBUI_URL=$WEBUI_URL
      - ENABLE_OAUTH_SIGNUP=true
      - ENABLE_LOGIN_FORM=false
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
    networks:
      - hephaistos
    volumes:
      - open-webui-data:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  hephaistos:
    external: true

volumes:
  open-webui-data:

# Common healthcheck template
x-common:
  healthcheck: &common-healthcheck
    interval: 2m
    timeout: 10s
    retries: 3
    start_period: 30s


services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-cpp
    restart: unless-stopped
    volumes:
      - /opt/llm/models:/models:ro
    ports:
      - 8000:8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    networks:
      - hephaistos
    command: >
      -m /models/Qwen3VL-4B-Thinking-Q4_K_M.gguf
      --mmproj /models/mmproj-Qwen3VL-4B-Thinking-Q8_0.gguf
      --host 0.0.0.0
      --port 8000
      --no-webui
      --threads 12
      --n-gpu-layers -1
      --ctx-size 16384
      --context-shift
      --flash-attn on
      --batch-size 64
      --ubatch-size 32
      --temperature 0.7
      --top-k 20
      --top-p 0.8
      --repeat-penalty 1.0
      --presence-penalty 0.3
      --reasoning-budget 512
      --log-verbosity 4
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      <<: *common-healthcheck

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      llama:
        condition: service_healthy
    ports:
      - "8001:8080"
    environment:
      # Point Open WebUI at llama.cpp's OpenAI-compatible API
      - OPENAI_API_BASE_URL=http://llama:8000/v1
      # llama.cpp doesn't require a real key; Open WebUI expects one to be set
      - OPENAI_API_KEY=local
      # Optional: makes first-run easier (admin user created on first visit)
      # - WEBUI_AUTH=true
      # Authentik settings
      - OAUTH_CLIENT_ID=$OAUTH_CLIENT_ID
      - OAUTH_CLIENT_SECRET=$OAUTH_CLIENT_SECRET
      - OAUTH_PROVIDER_NAME=authentik
      - OPENID_PROVIDER_URL=$OPENID_PROVIDER_URL
      - OPENID_REDIRECT_URI=$OPENID_REDIRECT_URI
      - WEBUI_URL=$WEBUI_URL
      - ENABLE_OAUTH_SIGNUP=true
      - ENABLE_LOGIN_FORM=false
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
    networks:
      - hephaistos
    volumes:
      - open-webui-data:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      <<: *common-healthcheck

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    networks:
      - hephaistos
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - ./qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333; echo -e 'GET /dashboard HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3; grep 'HTTP/1.1 200 OK' <&3"]
      <<: *common-healthcheck

  rag-bridge:
    image: 192.168.1.45:5000/rag-bridge:latest
    container_name: rag-bridge
    restart: unless-stopped
    ports: 
      - "8002:80"
    command: uv run fastapi run src/main.py --port 80
    networks:
      - hephaistos
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/80; echo -e 'GET /docs HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3; grep 'HTTP/1.1 200 OK' <&3"]
      <<: *common-healthcheck

networks:
  hephaistos:
    external: true

volumes:
  open-webui-data:

configs:
  qdrant_config:
    content: |
      log_level: INFO
